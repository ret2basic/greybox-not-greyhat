name: whitebox-engine-ci

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Lint and format
        run: |
          ruff format --check src tests scripts/inferforge.py
          ruff check src tests scripts/inferforge.py
          pyright
      - name: Compile
        run: python -m compileall -q src scripts/inferforge.py tests
      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Offline source-first end-to-end validation
        run: scripts/validate.sh
