name: Code Quality

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          cat > "$RUNNER_TEMP/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          @DAWN-Foundation:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/.npmrc" npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linting
        run: npm run lint
